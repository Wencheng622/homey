<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="#E9BA20"/>

  <!-- White house + details, scaled 5× and centered -->
  <g transform="translate(116, 56) scale(5)">

    <!-- House body -->
    <path
      d="M28 26
         L54 46
         L54 76 C54 78.2 52.2 80 50 80
         L6 80 C3.8 80 2 78.2 2 76
         L2 46
         Z"
      fill="white"
    />

    <!-- Door: brand yellow shows through white -->
    <path
      d="M21 80 L21 66 Q21 59 28 59 Q35 59 35 66 L35 80 Z"
      fill="#E9BA20"
      fill-opacity="0.75"
    />

    <!-- Honey drop: dark amber for contrast on yellow bg -->
    <path
      d="M28 26 C20 20 20 6 28 2 C36 6 36 20 28 26 Z"
      fill="#B8841A"
    />

  </g>

</svg>